<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    {% seo %}
    {% include head-custom.html %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  </head>
  <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
  <div class="lightbox-content">
    <button class="lightbox-close" type="button" onclick="closeLightboxButton()" aria-label="Close image viewer">×</button>
    <img id="lightbox-image" src="" alt="">
    <div id="lightbox-caption" class="lightbox-caption"></div>
  </div>
</div>

<script>
  function openLightbox(src, altText) {
    const lightbox = document.getElementById('lightbox');
    const image = document.getElementById('lightbox-image');
    const caption = document.getElementById('lightbox-caption');

    image.src = src;
    image.alt = altText || '';
    caption.textContent = altText || '';
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox(event) {
    if (!event || event.target.id === 'lightbox') {
      const lightbox = document.getElementById('lightbox');
      const image = document.getElementById('lightbox-image');
      lightbox.classList.remove('open');
      image.src = '';
      document.body.style.overflow = '';
    }
  }

  function closeLightboxButton() {
    const lightbox = document.getElementById('lightbox');
    const image = document.getElementById('lightbox-image');
    lightbox.classList.remove('open');
    image.src = '';
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', function (event) {
    if (event.key === 'Escape') {
      closeLightboxButton();
    }
  });
</script>
  <body>
    <div class="wrapper">
      <header class="site-header">
        <h1 class="site-title">{{ site.title | default: site.github.repository_name }}</h1>
        <p class="site-tagline">{{ site.tagline | default: site.description | default: site.github.project_tagline }}</p>
      </header>

      <main>
        {{ content }}
      </main>

      <footer class="site-footer">
        <hr>
        <p>
          Project maintained by
          <a href="{{ site.github.owner_url }}">{{ site.github.owner_name }}</a>
          <span class="footer-separator">—</span>
          Hosted on GitHub Pages
          <span class="footer-separator">—</span>
          Theme by <a href="https://twitter.com/mattgraham" target="_blank" rel="noopener noreferrer">mattgraham</a>
        </p>
      </footer>
    </div>
  </body>
</html>
