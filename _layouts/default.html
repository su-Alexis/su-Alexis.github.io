<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    {% seo %}
    {% include head-custom.html %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  </head>
  <body>
    <div class="wrapper">
      <header class="site-header">
        <h1 class="site-title">{{ site.title | default: site.github.repository_name }}</h1>
        <p class="site-tagline">{{ site.tagline | default: site.description | default: site.github.project_tagline }}</p>
      </header>

      <main>
        {{ content }}
      </main>

      <footer class="site-footer">
        <hr>
        <p>
          Project maintained by
          <a href="{{ site.github.owner_url }}">{{ site.github.owner_name }}</a>
          <span class="footer-separator">—</span>
          Hosted on GitHub Pages
          <span class="footer-separator">—</span>
          Theme by <a href="https://twitter.com/mattgraham" target="_blank" rel="noopener noreferrer">mattgraham</a>
        </p>
      </footer>
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
      <div class="lightbox-content">
        <button class="lightbox-close" type="button" onclick="closeLightboxButton()" aria-label="Close image viewer">×</button>
        <img id="lightbox-image" src="" alt="">
        <div id="lightbox-caption" class="lightbox-caption"></div>
      </div>
    </div>

   <script>
  let lightboxImages = [];
  let currentLightboxIndex = 0;

  function initLightbox() {
    lightboxImages = Array.from(document.querySelectorAll('.lightbox-trigger'));

    lightboxImages.forEach((img, index) => {
      img.style.cursor = 'pointer';
      img.addEventListener('click', () => openLightbox(index));
    });
  }

  function openLightbox(index) {
    if (!lightboxImages.length) return;

    currentLightboxIndex = index;

    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightbox-image');
    const caption = document.getElementById('lightbox-caption');

    const selectedImage = lightboxImages[currentLightboxIndex];

    lightboxImage.src = selectedImage.src;
    lightboxImage.alt = selectedImage.alt || '';
    caption.textContent = selectedImage.alt || '';

    lightbox.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function changeLightboxImage(direction) {
    if (!lightboxImages.length) return;

    currentLightboxIndex += direction;

    if (currentLightboxIndex < 0) {
      currentLightboxIndex = lightboxImages.length - 1;
    } else if (currentLightboxIndex >= lightboxImages.length) {
      currentLightboxIndex = 0;
    }

    openLightbox(currentLightboxIndex);
  }

  function closeLightbox(event) {
    const lightbox = document.getElementById('lightbox');

    if (!event || event.target === lightbox) {
      lightbox.style.display = 'none';
      document.body.style.overflow = '';
    }
  }

  function closeLightboxButton() {
    document.getElementById('lightbox').style.display = 'none';
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', function (event) {
    const lightbox = document.getElementById('lightbox');
    if (lightbox.style.display !== 'flex') return;

    if (event.key === 'Escape') {
      closeLightboxButton();
    } else if (event.key === 'ArrowLeft') {
      changeLightboxImage(-1);
    } else if (event.key === 'ArrowRight') {
      changeLightboxImage(1);
    }
  });

  document.addEventListener('DOMContentLoaded', initLightbox);
</script>
  </body>
</html>
