<div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
  <div class="lightbox-content" onclick="event.stopPropagation()">
    <button class="lightbox-close" type="button" onclick="closeLightboxButton()" aria-label="Close image viewer">×</button>

    <button class="lightbox-nav lightbox-prev" type="button" onclick="changeLightboxImage(-1)" aria-label="Previous image">
      &#10094;
    </button>

    <img id="lightbox-image" src="" alt="">

    <button class="lightbox-nav lightbox-next" type="button" onclick="changeLightboxImage(1)" aria-label="Next image">
      &#10095;
    </button>

    <div id="lightbox-caption" class="lightbox-caption"></div>
  </div>
</div>

<script>
  let currentLightboxIndex = 0;
  let lightboxItems = [];

  function getLightboxItems() {
    lightboxItems = Array.from(document.querySelectorAll('.screenshot-gallery .screenshot-link'));
    return lightboxItems;
  }

  function openLightbox(event, index) {
    event.preventDefault();

    const items = getLightboxItems();
    if (!items.length) return;

    currentLightboxIndex = index;
    updateLightboxImage();

    const lightbox = document.getElementById('lightbox');
    lightbox.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function updateLightboxImage() {
    const items = getLightboxItems();
    if (!items.length) return;

    const item = items[currentLightboxIndex];
    const lightboxImage = document.getElementById('lightbox-image');
    const lightboxCaption = document.getElementById('lightbox-caption');

    lightboxImage.src = item.href;
    lightboxImage.alt = item.dataset.caption || item.querySelector('img')?.alt || '';
    lightboxCaption.textContent = item.dataset.caption || item.querySelector('img')?.alt || '';
  }

  function changeLightboxImage(direction) {
    const items = getLightboxItems();
    if (!items.length) return;

    currentLightboxIndex += direction;

    if (currentLightboxIndex < 0) {
      currentLightboxIndex = items.length - 1;
    } else if (currentLightboxIndex >= items.length) {
      currentLightboxIndex = 0;
    }

    updateLightboxImage();
  }

  function closeLightbox(event) {
    const lightbox = document.getElementById('lightbox');

    if (!event || event.target === lightbox) {
      lightbox.style.display = 'none';
      document.body.style.overflow = '';
    }
  }

  function closeLightboxButton() {
    document.getElementById('lightbox').style.display = 'none';
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', function (event) {
    const lightbox = document.getElementById('lightbox');
    if (lightbox.style.display !== 'flex') return;

    if (event.key === 'Escape') {
      closeLightboxButton();
    } else if (event.key === 'ArrowLeft') {
      changeLightboxImage(-1);
    } else if (event.key === 'ArrowRight') {
      changeLightboxImage(1);
    }
  });
</script>
